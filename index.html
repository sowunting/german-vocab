<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mein Wörterbuch</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2eb; --card: #fffef9; --ink: #1a1714; --ink2: #6b6560; --ink3: #a8a39d;
    --border: #e2ddd6;
    --der: #c8dff5; --der-text: #1a3a5c; --der-strong: #2d6aad;
    --die: #fde8c0; --die-text: #5c3200; --die-strong: #c47a00;
    --das: #cff0dc; --das-text: #0f3d1e; --das-strong: #1e8c45;
    --accent: #2d6aad; --shadow: 0 2px 12px rgba(0,0,0,0.07); --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }
  .app { max-width: 900px; margin: 0 auto; padding: 0 16px 40px; }

  header { padding: 32px 0 20px; border-bottom: 1px solid var(--border); margin-bottom: 24px; display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .logo { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }
  .logo span { color: var(--der-strong); }
  .subtitle { font-size: 13px; color: var(--ink3); margin-top: 2px; font-weight: 300; }
  .stats { display: flex; gap: 16px; font-size: 13px; color: var(--ink2); }
  .stat { display: flex; flex-direction: column; align-items: center; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; color: var(--ink); line-height: 1; }

  .add-panel { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 24px; box-shadow: var(--shadow); }
  .add-title { font-size: 13px; font-weight: 500; color: var(--ink2); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.06em; }

  .lookup-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
  .inp-wrap { position: relative; flex: 1; }
  #inp-de { width: 100%; padding: 10px 38px 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--ink); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color .15s; }
  #inp-de:focus { border-color: var(--accent); }
  #inp-de.loading { border-color: var(--accent); }
  .spinner { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); display: none; width: 16px; height: 16px; border: 2px solid #ddd; border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }
  .spinner.on { display: block; }
  .btn-lookup { padding: 10px 18px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; }
  .btn-lookup:hover { background: #1a4a8a; }
  .btn-lookup:disabled { background: #aaa; cursor: not-allowed; }

  .hint { font-size: 12px; color: var(--ink3); margin-bottom: 4px; }
  .err-msg { font-size: 12px; color: #c0392b; margin-top: 6px; display: none; }

  .result-box { display: none; margin-top: 12px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .result-box.on { display: block; }
  .result-preview { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--bg); flex-wrap: wrap; }
  .r-badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 10px; }
  .r-der { background: var(--der); color: var(--der-text); }
  .r-die { background: var(--die); color: var(--die-text); }
  .r-das { background: var(--das); color: var(--das-text); }
  .r-word { font-weight: 500; font-size: 15px; }
  .r-dash { color: var(--ink3); }
  .r-en { color: var(--ink2); flex: 1; font-size: 14px; }
  .r-cat { font-size: 11px; color: var(--ink3); background: var(--border); padding: 2px 7px; border-radius: 8px; }
  .r-note { width: 100%; font-size: 12px; color: var(--die-strong); font-style: italic; margin-top: 2px; display: none; }
  .result-edit { padding: 12px 14px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; border-top: 1px solid var(--border); background: var(--card); }
  .result-edit select, .result-edit input { padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--ink); font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; }
  .result-edit select:focus, .result-edit input:focus { border-color: var(--accent); }
  .sel-art { width: 70px; font-weight: 500; }
  .sel-art.s-der { background: var(--der); color: var(--der-text); border-color: #a8c8e8; }
  .sel-art.s-die { background: var(--die); color: var(--die-text); border-color: #f0c070; }
  .sel-art.s-das { background: var(--das); color: var(--das-text); border-color: #8fd4a8; }
  .inp-en { flex: 1; min-width: 120px; }
  .inp-cat { flex: 1; min-width: 140px; }
  .btn-add { padding: 7px 16px; background: var(--ink); color: #fff; border: none; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; }
  .btn-add:hover { background: #333; }
  .btn-discard { padding: 7px 12px; background: none; color: var(--ink3); border: 1px solid var(--border); border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; }
  .btn-discard:hover { color: var(--ink); }
  .new-cat-hint { font-size: 11px; color: var(--der-strong); margin-top: 4px; width: 100%; display: none; }

  .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .search-wrap { flex: 1; min-width: 160px; position: relative; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); opacity: .35; pointer-events: none; }
  .search { width: 100%; padding: 8px 12px 8px 34px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--ink); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; }
  .search:focus { border-color: var(--accent); }
  .filter-btns { display: flex; gap: 6px; }
  .fbtn { padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); font-size: 13px; cursor: pointer; color: var(--ink2); font-family: 'DM Sans', sans-serif; }
  .fbtn.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .fbtn.fd.active { background: var(--der); color: var(--der-text); border-color: var(--der-strong); }
  .fbtn.fi.active { background: var(--die); color: var(--die-text); border-color: var(--die-strong); }
  .fbtn.fs.active { background: var(--das); color: var(--das-text); border-color: var(--das-strong); }

  .category { margin-bottom: 28px; }
  .cat-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
  .cat-name { font-size: 12px; font-weight: 500; color: var(--ink2); text-transform: uppercase; letter-spacing: .07em; }
  .cat-count { font-size: 11px; color: var(--ink3); }
  .words-grid { display: flex; flex-wrap: wrap; gap: 7px; }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px 6px 8px; border-radius: 20px; font-size: 13px; border: 1px solid transparent; transition: transform .1s; }
  .pill:hover { transform: translateY(-1px); }
  .pill:hover .pdel { opacity: 1; }
  .p-der { background: var(--der); border-color: #a8c8e8; }
  .p-die { background: var(--die); border-color: #f0c070; }
  .p-das { background: var(--das); border-color: #8fd4a8; }
  .pbadge { font-size: 10px; font-weight: 500; padding: 2px 6px; border-radius: 10px; }
  .b-der { background: #a8c8e8; color: var(--der-text); }
  .b-die { background: #f0c070; color: var(--die-text); }
  .b-das { background: #8fd4a8; color: var(--das-text); }
  .pde { font-weight: 500; }
  .pen { color: var(--ink2); font-size: 12px; }
  .pdel { opacity: 0; background: none; border: none; cursor: pointer; color: var(--ink3); font-size: 15px; padding: 0 0 0 2px; transition: opacity .15s, color .15s; }
  .pdel:hover { color: #c0392b; }

  .empty { text-align: center; padding: 48px; color: var(--ink3); }
  .empty-icon { font-family: 'Playfair Display', serif; font-size: 40px; margin-bottom: 8px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--ink); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all .3s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .cache-badge { font-size: 10px; color: var(--das-strong); background: var(--das); padding: 1px 6px; border-radius: 8px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <div class="logo">Mein <span>Wörterbuch</span></div>
      <div class="subtitle">My German vocabulary list</div>
    </div>
    <div class="stats">
      <div class="stat"><span class="stat-num" id="cnt-all">0</span><span>total</span></div>
      <div class="stat"><span class="stat-num" id="cnt-der" style="color:var(--der-strong)">0</span><span style="color:var(--der-strong)">der</span></div>
      <div class="stat"><span class="stat-num" id="cnt-die" style="color:var(--die-strong)">0</span><span style="color:var(--die-strong)">die</span></div>
      <div class="stat"><span class="stat-num" id="cnt-das" style="color:var(--das-strong)">0</span><span style="color:var(--das-strong)">das</span></div>
    </div>
  </header>

  <div class="add-panel">
    <div class="add-title">Add a new word</div>
    <div class="lookup-row">
      <div class="inp-wrap">
        <input id="inp-de" type="text" placeholder="Type a German word and press Enter…" maxlength="60"
          onkeydown="if(event.key==='Enter')lookup()">
        <div class="spinner" id="spin"></div>
      </div>
      <button class="btn-lookup" id="btn-lk" onclick="lookup()">Look up</button>
    </div>
    <div class="hint" id="hint">Press Enter or click Look up. Repeated lookups are instant — results are cached locally.</div>
    <div class="err-msg" id="errmsg"></div>

    <div class="result-box" id="result-box">
      <div class="result-preview">
        <span class="r-badge" id="r-art"></span>
        <span class="r-word" id="r-word"></span>
        <span class="r-dash">—</span>
        <span class="r-en" id="r-en"></span>
        <span class="r-cat" id="r-cat"></span>
        <div class="r-note" id="r-note"></div>
      </div>
      <div class="result-edit">
        <select class="sel-art" id="e-art" onchange="syncArtSel()">
          <option value="der">der</option>
          <option value="die">die</option>
          <option value="das">das</option>
        </select>
        <input class="inp-en" id="e-en" type="text" placeholder="Translation">
        <input class="inp-cat" id="e-cat" type="text" placeholder="Category">
        <button class="btn-add" onclick="addWord()">+ Add to list</button>
        <button class="btn-discard" onclick="discard()">Discard</button>
        <div class="new-cat-hint" id="new-cat-hint"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="#555" stroke-width="1.5"/><line x1="9.5" y1="9.5" x2="13" y2="13" stroke="#555" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input class="search" id="search" type="text" placeholder="Search words…" oninput="render()">
    </div>
    <div class="filter-btns">
      <button class="fbtn active" id="f-all" onclick="setF('all')">All</button>
      <button class="fbtn fd" id="f-der" onclick="setF('der')">der</button>
      <button class="fbtn fi" id="f-die" onclick="setF('die')">die</button>
      <button class="fbtn fs" id="f-das" onclick="setF('das')">das</button>
    </div>
  </div>

  <div id="list"></div>
</div>
<div class="toast" id="toast"></div>

let words = (() => { try { const s=localStorage.getItem(KEY); return s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT)); } catch(e){ return JSON.parse(JSON.stringify(DEFAULT)); } })();
let cache = (() => { try { const s=localStorage.getItem(CACHE_KEY); return s?JSON.parse(s):{}; } catch(e){ return {}; } })();
function saveWords(){ try{localStorage.setItem(KEY,JSON.stringify(words));}catch(e){} }
function saveCache(){ try{localStorage.setItem(CACHE_KEY,JSON.stringify(cache));}catch(e){} }

let filt='all', result=null;

function getAllCats(){
  const existing=[...new Set(words.map(w=>w.cat))];
  const extra=existing.filter(c=>!FIXED_CATS.includes(c));
  return [...FIXED_CATS,...extra];
}

async function lookup(){
  const raw = document.getElementById('inp-de').value.trim();
  if(!raw) return;

  const cacheKey = raw.toLowerCase();

  // Instant cache hit
  if(cache[cacheKey]){
    showResult({...cache[cacheKey], fromCache:true});
    return;
  }

  setLoading(true); hideResult(); setErr('');

  const existingCats = getAllCats().join(', ');

  const prompt = `You are a precise German dictionary. The user typed: "${raw}"

Reply ONLY with a valid JSON object. No markdown, no prose, no backticks.

Rules:
- Correct spelling if needed (Umlauts: ä ö ü ß). Capitalise the noun.
- "article": exactly "der", "die", or "das"
- "word": correctly spelled and capitalised German noun
- "translation": short English meaning, 1–5 words
- "category": choose the single best fit from this list, using the exact string: ${existingCats}
  OR if none fit well, create a new descriptive category with a relevant emoji (e.g. "🎨 Art & creativity", "💊 Health & body", "🚗 Transport"). Never use "Other".
- "isNewCat": true if you invented a new category, false otherwise
- "corrected": true if you fixed the spelling, false otherwise
- "original": the user's original input if corrected, else ""
- "error": "not a noun" if input is not a German noun, else ""

Respond with exactly this shape:
{"article":"","word":"","translation":"","category":"","isNewCat":false,"corrected":false,"original":"","error":""}`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 200,
        messages: [{role:"user", content:prompt}]
      })
    });

    if(!res.ok) throw new Error('API error ' + res.status);

    const data = await res.json();
    const txt = data.content?.find(b=>b.type==='text')?.text || '';
    const clean = txt.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);

    if(parsed.error && parsed.error !== ''){
      setErr('"' + raw + '" doesn\'t seem to be a German noun. Try another word.');
    } else {
      // Cache the result
      cache[cacheKey] = parsed;
      saveCache();
      showResult(parsed);
    }
  } catch(e) {
    setErr('Lookup failed. Please check your internet connection and try again.');
  }

  setLoading(false);
}

function setLoading(on){
  document.getElementById('spin').classList.toggle('on', on);
  document.getElementById('inp-de').classList.toggle('loading', on);
  const btn = document.getElementById('btn-lk');
  btn.disabled = on;
  btn.textContent = on ? '…' : 'Look up';
}

function showResult(r){
  result = r;
  document.getElementById('r-art').textContent = r.article;
  document.getElementById('r-art').className = 'r-badge r-' + r.article;
  document.getElementById('r-word').textContent = r.word;
  document.getElementById('r-en').textContent = r.translation;
  document.getElementById('r-cat').textContent = r.category || '';

  const noteEl = document.getElementById('r-note');
  const parts = [];
  if(r.corrected) parts.push('Spelling corrected: "' + r.original + '" → "' + r.word + '"');
  if(r.fromCache) parts.push('⚡ from cache');
  noteEl.textContent = parts.join(' · ');
  noteEl.style.display = parts.length ? 'block' : 'none';

  document.getElementById('e-art').value = r.article; syncArtSel();
  document.getElementById('e-en').value = r.translation;
  document.getElementById('e-cat').value = r.category || '';

  const hint = document.getElementById('new-cat-hint');
  if(r.isNewCat){
    hint.textContent = '✦ New category "' + r.category + '" will be created';
    hint.style.display = 'block';
  } else {
    hint.style.display = 'none';
  }

  document.getElementById('result-box').classList.add('on');
  document.getElementById('hint').style.display = 'none';
}

function hideResult(){
  document.getElementById('result-box').classList.remove('on');
  document.getElementById('hint').style.display = 'block';
  result = null;
}

function discard(){
  document.getElementById('inp-de').value = '';
  hideResult(); setErr('');
}

function setErr(msg){
  const el = document.getElementById('errmsg');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function syncArtSel(){
  const sel = document.getElementById('e-art');
  sel.className = 'sel-art s-' + sel.value;
}

function addWord(){
  if(!result) return;
  const art = document.getElementById('e-art').value;
  const de = result.word;
  const en = document.getElementById('e-en').value.trim();
  const cat = document.getElementById('e-cat').value.trim();
  if(!en){ setErr('Please provide a translation.'); return; }
  if(!cat){ setErr('Please provide a category.'); return; }
  if(words.find(w=>w.de.toLowerCase()===de.toLowerCase())){
    setErr('"' + de + '" is already in your list.'); return;
  }
  words.push({art, de, en, cat});
  saveWords(); render(); discard();
  toast('Added: ' + art + ' ' + de);
}

function del(i){
  const w = words[i];
  words.splice(i,1); saveWords(); render();
  toast('Removed: ' + w.de);
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function setF(f){
  filt = f;
  ['all','der','die','das'].forEach(x=>document.getElementById('f-'+x).classList.remove('active'));
  document.getElementById('f-'+f).classList.add('active');
  render();
}

function render(){
  const q = document.getElementById('search').value.toLowerCase().trim();
  const view = words.map((w,i)=>({...w,i})).filter(w=>{
    if(filt!=='all' && w.art!==filt) return false;
    if(q && !w.de.toLowerCase().includes(q) && !w.en.toLowerCase().includes(q)) return false;
    return true;
  });

  document.getElementById('cnt-all').textContent = words.length;
  document.getElementById('cnt-der').textContent = words.filter(w=>w.art==='der').length;
  document.getElementById('cnt-die').textContent = words.filter(w=>w.art==='die').length;
  document.getElementById('cnt-das').textContent = words.filter(w=>w.art==='das').length;

  const list = document.getElementById('list');
  if(!view.length){
    list.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div style="font-size:14px;color:var(--ink3)">No words found</div></div>';
    return;
  }

  const cats = {};
  view.forEach(w=>{ if(!cats[w.cat]) cats[w.cat]=[]; cats[w.cat].push(w); });

  const allCatOrder = getAllCats();
  const sorted = Object.keys(cats).sort((a,b)=>{
    const ai=allCatOrder.indexOf(a), bi=allCatOrder.indexOf(b);
    if(ai===-1&&bi===-1) return a.localeCompare(b);
    if(ai===-1) return 1; if(bi===-1) return -1;
    return ai-bi;
  });

  list.innerHTML = sorted.map(cat=>`
    <div class="category">
      <div class="cat-header">
        <div class="cat-name">${cat}</div>
        <div class="cat-count">${cats[cat].length} word${cats[cat].length!==1?'s':''}</div>
      </div>
      <div class="words-grid">${cats[cat].map(w=>`
        <span class="pill p-${w.art}">
          <span class="pbadge b-${w.art}">${w.art}</span>
          <span class="pde">${w.de}</span>
          <span class="pen">${w.en}</span>
          <button class="pdel" onclick="del(${w.i})" title="Remove">×</button>
        </span>`).join('')}
      </div>
    </div>`).join('');
}

render();
</script>
</body>
</html>
